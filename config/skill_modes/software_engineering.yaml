    required_inputs:
      - goal
      - user_problem
      - constraints
      - success_signal
    expected_artifacts:
      - .meta/<repo>/plan_ceo_review/product_review_report.md
      - .meta/<repo>/plan_ceo_review/opportunity_map.json
      - docs/requirements/*.md
    agent_manifest_ids:
      - software_engineering.plan_ceo_review
    metadata:
      kind: planning
      host_surface: codex_adapted
      upstream_skill: vendors/gstack/plan-ceo-review/SKILL.md
      status: executable

