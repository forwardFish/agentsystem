workflow_plugin_id: software_engineering
manifest_version: v2
modes:
  - mode_id: office-hours
    name: Office Hours
    version: v1
    description: Run six forcing questions to reframe demand, status quo, wedge, and proof before any implementation starts.
    template_dir: .claude/agents/office-hours
    runtime_ready: true
    entry_mode: office_hours
    stop_after: office_hours
    report_only: true
    fixer_allowed: false
    allowed_tools:
      - repo_context
      - workflow_manifest
      - product_scope_notes
    required_inputs:
      - goal
    expected_artifacts:
      - .meta/<repo>/office_hours/office_hours_report.md
      - .meta/<repo>/office_hours/forcing_questions.json
    agent_manifest_ids:
      - software_engineering.office_hours
    metadata:
      kind: planning
      host_surface: codex_adapted
      upstream_skill: vendors/gstack/office-hours/SKILL.md
      status: executable

  - mode_id: plan-ceo-review
    name: Plan CEO Review
    version: v1
