workflow_plugin_id: software_engineering
manifest_version: v1
modes:
  - mode_id: plan-eng-review
    name: Plan Engineering Review
    version: v1
    description: 在改代码前先产出实现结构、边界条件和测试计划。
    template_dir: .claude/agents/plan-eng-review
    entry_mode: requirement_analysis
    stop_after: architecture_review
    report_only: true
    fixer_allowed: false
    allowed_tools:
      - repo_context
      - workflow_manifest
      - agent_manifest
    required_inputs:
      - goal
      - acceptance_criteria
      - related_files
      - constraints
    expected_artifacts:
      - .meta/<repo>/architecture_review/architecture_review_report.md
      - .meta/<repo>/architecture_review/test_plan.json
    agent_manifest_ids:
      - software_engineering.requirement_analysis
      - software_engineering.architecture_review
    metadata:
      kind: planning
      host_surface: claude_skill
  - mode_id: browse
    name: Browse
    version: v1
    description: 给 agentsystem 一个轻量的运行时浏览与探测模式，只出报告，不修代码。
    template_dir: .claude/agents/browse
    entry_mode: browser_qa
    stop_after: browser_qa
    report_only: true
    fixer_allowed: false
    default_browser_qa_mode: report_only
    allowed_tools:
      - browser_runtime
      - http_probe
      - repo_context
    required_inputs:
      - browser_urls
      - preview_base_url
      - preview_route
    expected_artifacts:
      - .meta/<repo>/browser_qa/browser_qa_report.md
      - .meta/<repo>/browser_runtime/session.json
      - .meta/<repo>/browser_runtime/probes/*.json
    agent_manifest_ids:
      - software_engineering.browser_qa
    metadata:
      kind: qa
      host_surface: claude_skill
  - mode_id: qa
    name: QA
    version: v1
    description: 运行测试与 Browser QA，并在 blocking finding 时允许进入 fixer 回路。
    template_dir: .claude/agents/qa
    entry_mode: tester
    stop_after: browser_qa
    report_only: false
    fixer_allowed: true
    default_browser_qa_mode: quick
    allowed_tools:
      - repo_context
      - command_exec
      - browser_runtime
      - http_probe
    required_inputs:
      - goal
      - related_files
      - browser_urls
      - preview_base_url
      - preview_route
    expected_artifacts:
      - .meta/<repo>/test/test_report.md
      - .meta/<repo>/browser_qa/browser_qa_report.md
      - .meta/<repo>/browser_runtime/session.json
      - .meta/<repo>/fixer/fix_report.md
    agent_manifest_ids:
      - software_engineering.tester
      - software_engineering.browser_qa
      - software_engineering.fixer
    metadata:
      kind: qa
      host_surface: claude_skill
  - mode_id: qa-only
    name: QA Only
    version: v1
    description: 与 QA 相同的验证路径，但永远不进入 fixer，只保留报告与证据。
    template_dir: .claude/agents/qa-only
    entry_mode: tester
    stop_after: browser_qa
    report_only: true
    fixer_allowed: false
    default_browser_qa_mode: qa_only
    allowed_tools:
      - repo_context
      - command_exec
      - browser_runtime
      - http_probe
    required_inputs:
      - goal
      - related_files
      - browser_urls
      - preview_base_url
      - preview_route
    expected_artifacts:
      - .meta/<repo>/test/test_report.md
      - .meta/<repo>/browser_qa/browser_qa_report.md
      - .meta/<repo>/browser_runtime/session.json
    agent_manifest_ids:
      - software_engineering.tester
      - software_engineering.browser_qa
    metadata:
      kind: qa
      host_surface: claude_skill
