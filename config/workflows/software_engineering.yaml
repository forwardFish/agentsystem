plugin_id: software_engineering
name: Software Engineering Workflow
description: Default agentsystem workflow for story delivery with automatic planning, QA, review, and acceptance.
entry_point: requirement_analysis
policy_refs:
  - WorkflowPolicy.default
  - ReviewPolicy.default
  - ReleasePolicy.default
trigger_events:
  - task.created
verification_pipeline:
  - architecture_review
  - plan_design_review
  - design_consultation
  - code_style_review
  - test
  - browser_qa
  - runtime_qa
  - qa_design_review
  - security_scan
  - review
  - code_acceptance
  - acceptance_gate
human_approval_points:
  - acceptance_gate
metadata:
  domain: software_engineering
  plugin_kind: build_engineering
  manifest_version: v1
nodes:
  - node_id: requirement_analysis
    display_name: Requirement
    agent_manifest: software_engineering.requirement_analysis
  - node_id: architecture_review
    display_name: Architecture Review
    agent_manifest: software_engineering.architecture_review
  - node_id: plan_design_review
    display_name: Plan Design Review
    agent_manifest: software_engineering.plan_design_review
  - node_id: design_consultation
    display_name: Design Consultation
    agent_manifest: software_engineering.design_consultation
  - node_id: workspace_prep
    display_name: Workspace Prep
    agent_manifest: software_engineering.workspace_prep
  - node_id: backend_dev
    display_name: Backend Dev
    agent_manifest: software_engineering.backend_dev
  - node_id: frontend_dev
    display_name: Frontend Dev
    agent_manifest: software_engineering.frontend_dev
  - node_id: database_dev
    display_name: Database Dev
    agent_manifest: software_engineering.database_dev
  - node_id: devops_dev
    display_name: DevOps Dev
    agent_manifest: software_engineering.devops_dev
  - node_id: sync_merge
    display_name: Sync Merge
    agent_manifest: software_engineering.sync_merge
  - node_id: code_style_reviewer
    display_name: Code Style Reviewer
    agent_manifest: software_engineering.code_style_reviewer
  - node_id: tester
    display_name: Tester
    agent_manifest: software_engineering.tester
  - node_id: browser_qa
    display_name: Browser QA
    agent_manifest: software_engineering.browser_qa
  - node_id: runtime_qa
    display_name: Runtime QA
    agent_manifest: software_engineering.runtime_qa
  - node_id: qa_design_review
    display_name: QA Design Review
    agent_manifest: software_engineering.qa_design_review
  - node_id: fixer
    display_name: Fixer
    agent_manifest: software_engineering.fixer
  - node_id: security_scanner
    display_name: Security Scanner
    agent_manifest: software_engineering.security_scanner
  - node_id: reviewer
    display_name: Reviewer
    agent_manifest: software_engineering.reviewer
  - node_id: code_acceptance
    display_name: Code Acceptance
    agent_manifest: software_engineering.code_acceptance
  - node_id: acceptance_gate
    display_name: Acceptance Gate
    agent_manifest: software_engineering.acceptance_gate
  - node_id: doc_writer
    display_name: Doc Writer
    agent_manifest: software_engineering.doc_writer
edges:
  - source: requirement_analysis
    target: architecture_review
  - source: backend_dev
    target: sync_merge
  - source: frontend_dev
    target: sync_merge
  - source: database_dev
    target: sync_merge
  - source: devops_dev
    target: sync_merge
  - source: sync_merge
    target: code_style_reviewer
  - source: qa_design_review
    target: security_scanner
  - source: security_scanner
    target: reviewer
  - source: doc_writer
    target: __end__
conditional_edges:
  - source: architecture_review
    router: route_after_architecture_review
    routes:
      plan_design_review: plan_design_review
      workspace_prep: workspace_prep
      __end__: __end__
  - source: plan_design_review
    router: route_after_plan_design_review
    routes:
      design_consultation: design_consultation
      workspace_prep: workspace_prep
      __end__: __end__
  - source: design_consultation
    router: route_after_design_consultation
    routes:
      workspace_prep: workspace_prep
      __end__: __end__
  - source: workspace_prep
    router: task_router
    routes:
      backend_dev: backend_dev
      frontend_dev: frontend_dev
      database_dev: database_dev
      devops_dev: devops_dev
      sync_merge: sync_merge
  - source: code_style_reviewer
    router: route_after_code_style_review
    routes:
      tester: tester
      fixer: fixer
  - source: tester
    router: route_after_test
    routes:
      fixer: fixer
      browser_qa: browser_qa
      runtime_qa: runtime_qa
      security_scanner: security_scanner
      __end__: __end__
  - source: browser_qa
    router: route_after_browser_qa
    routes:
      fixer: fixer
      qa_design_review: qa_design_review
      security_scanner: security_scanner
      __end__: __end__
  - source: runtime_qa
    router: route_after_runtime_qa
    routes:
      fixer: fixer
      security_scanner: security_scanner
      __end__: __end__
  - source: fixer
    router: route_after_fix
    routes:
      code_style_reviewer: code_style_reviewer
      tester: tester
      browser_qa: browser_qa
      runtime_qa: runtime_qa
      reviewer: reviewer
      code_acceptance: code_acceptance
      acceptance_gate: acceptance_gate
      __end__: __end__
  - source: reviewer
    router: route_after_review
    routes:
      code_acceptance: code_acceptance
      fixer: fixer
  - source: code_acceptance
    router: route_after_code_acceptance
    routes:
      acceptance_gate: acceptance_gate
      fixer: fixer
  - source: acceptance_gate
    router: route_after_acceptance
    routes:
      doc_writer: doc_writer
      fixer: fixer
