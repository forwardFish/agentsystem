<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentSystem Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto max-w-7xl p-6">
    <div class="mb-6 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-3xl font-bold">AgentSystem 执行面板</h1>
        <p class="mt-2 text-sm text-slate-400">查看任务状态、实时日志、产物和质量指标。</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="socket-status" class="rounded-full border border-slate-700 px-3 py-1 text-xs text-slate-300">WebSocket 未连接</span>
        <button id="refresh-button" class="rounded-md bg-slate-800 px-3 py-2 text-sm hover:bg-slate-700">刷新</button>
      </div>
    </div>

    <div class="mb-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
      <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="text-xs uppercase tracking-wide text-slate-400">总任务数</div>
        <div id="metric-total" class="mt-2 text-3xl font-semibold">0</div>
      </div>
      <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="text-xs uppercase tracking-wide text-slate-400">首次交付通过率</div>
        <div id="metric-first-pass" class="mt-2 text-3xl font-semibold">0%</div>
      </div>
      <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="text-xs uppercase tracking-wide text-slate-400">平均回修轮次</div>
        <div id="metric-retries" class="mt-2 text-3xl font-semibold">0</div>
      </div>
      <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="text-xs uppercase tracking-wide text-slate-400">验收项命中率</div>
        <div id="metric-acceptance" class="mt-2 text-3xl font-semibold">0%</div>
      </div>
    </div>

    <div class="mb-6 grid gap-4 xl:grid-cols-3">
      <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="mb-3 text-sm font-medium text-slate-300">近 7 天成功率</div>
        <canvas id="success-chart" height="180"></canvas>
      </div>
      <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="mb-3 text-sm font-medium text-slate-300">近 7 天回修轮次</div>
        <canvas id="retry-chart" height="180"></canvas>
      </div>
      <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="mb-3 text-sm font-medium text-slate-300">近 7 天验收命中率</div>
        <canvas id="acceptance-chart" height="180"></canvas>
      </div>
    </div>

    <div class="grid gap-6 xl:grid-cols-[360px_minmax(0,1fr)]">
      <section class="rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-lg font-semibold">任务列表</h2>
          <span id="task-count" class="text-sm text-slate-400">0 个任务</span>
        </div>
        <div id="task-list" class="space-y-3"></div>
      </section>

      <section class="space-y-6">
        <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 id="detail-title" class="text-xl font-semibold">选择一个任务</h2>
              <p id="detail-meta" class="mt-2 text-sm text-slate-400">将在这里显示任务详情。</p>
            </div>
            <span id="detail-status" class="rounded-full border border-slate-700 px-3 py-1 text-xs text-slate-300">未选择</span>
          </div>
        </div>

        <div class="grid gap-6 xl:grid-cols-2">
          <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
            <h3 class="mb-4 text-lg font-semibold">实时日志</h3>
            <div id="live-logs" class="max-h-[520px] overflow-y-auto rounded-lg bg-slate-950 p-3 font-mono text-xs leading-6 text-slate-200"></div>
          </div>

          <div class="space-y-6">
            <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
              <h3 class="mb-4 text-lg font-semibold">PR 描述</h3>
              <div id="artifact-pr" class="prose prose-invert max-w-none text-sm"></div>
            </div>
            <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
              <h3 class="mb-4 text-lg font-semibold">审查报告</h3>
              <div id="artifact-review" class="prose prose-invert max-w-none text-sm"></div>
            </div>
            <div class="rounded-xl border border-slate-800 bg-slate-900 p-4">
              <h3 class="mb-4 text-lg font-semibold">Commit Message</h3>
              <pre id="artifact-commit" class="overflow-x-auto rounded-lg bg-slate-950 p-3 text-sm text-slate-200"></pre>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const apiBase = "";
    let selectedTaskId = null;
    let socket = null;
    let successChart = null;
    let retryChart = null;
    let acceptanceChart = null;

    async function fetchJson(path) {
      const response = await fetch(`${apiBase}${path}`);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      return response.json();
    }

    function setSocketStatus(text, isConnected) {
      const el = document.getElementById("socket-status");
      el.textContent = text;
      el.className = `rounded-full border px-3 py-1 text-xs ${
        isConnected
          ? "border-emerald-500/40 bg-emerald-500/10 text-emerald-300"
          : "border-slate-700 text-slate-300"
      }`;
    }

    function updateChart(instance, canvasId, labels, values, label, color) {
      if (instance) {
        instance.data.labels = labels;
        instance.data.datasets[0].data = values;
        instance.update();
        return instance;
      }

      const ctx = document.getElementById(canvasId).getContext("2d");
      return new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: [{
            label,
            data: values,
            borderColor: color,
            backgroundColor: color + "33",
            tension: 0.25,
            fill: true,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: "#cbd5e1" } }
          },
          scales: {
            x: {
              ticks: { color: "#94a3b8" },
              grid: { color: "rgba(148, 163, 184, 0.1)" }
            },
            y: {
              ticks: { color: "#94a3b8" },
              grid: { color: "rgba(148, 163, 184, 0.1)" }
            }
          }
        }
      });
    }

    function appendLiveLog(event) {
      const container = document.getElementById("live-logs");
      const line = document.createElement("div");
      const level = event.payload?.level || event.type;
      const levelClass = level === "ERROR"
        ? "text-rose-300"
        : level === "WARNING"
          ? "text-amber-300"
          : "text-slate-200";
      const message = event.payload?.message || JSON.stringify(event.payload || {});
      line.className = `${levelClass} border-b border-slate-900 py-1`;
      line.textContent = `[${event.timestamp}] ${event.type} ${message}`;
      container.appendChild(line);
      container.scrollTop = container.scrollHeight;
    }

    function clearLiveLogs() {
      document.getElementById("live-logs").innerHTML = "";
    }

    function connectTaskSocket(taskId) {
      if (socket) {
        socket.close();
        socket = null;
      }
      if (!taskId) {
        setSocketStatus("WebSocket 未连接", false);
        return;
      }

      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      socket = new WebSocket(`${protocol}://${window.location.host}/ws/${taskId}`);
      setSocketStatus("WebSocket 连接中", false);

      socket.onopen = () => setSocketStatus("WebSocket 已连接", true);
      socket.onclose = () => setSocketStatus("WebSocket 已断开", false);
      socket.onerror = () => setSocketStatus("WebSocket 错误", false);
      socket.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        appendLiveLog(payload);
      };
    }

    async function loadMetrics() {
      const metrics = await fetchJson("/api/metrics");
      document.getElementById("metric-total").textContent = metrics.total_tasks;
      document.getElementById("metric-first-pass").textContent = `${metrics.first_pass_rate}%`;
      document.getElementById("metric-retries").textContent = metrics.avg_retry_rounds;
      document.getElementById("metric-acceptance").textContent = `${metrics.acceptance_hit_rate}%`;

      const labels = metrics.trend?.labels || [];
      successChart = updateChart(successChart, "success-chart", labels, metrics.trend?.success_rate || [], "成功率", "#38bdf8");
      retryChart = updateChart(retryChart, "retry-chart", labels, metrics.trend?.avg_retry_rounds || [], "回修轮次", "#f59e0b");
      acceptanceChart = updateChart(acceptanceChart, "acceptance-chart", labels, metrics.trend?.acceptance_hit_rate || [], "验收命中率", "#34d399");
    }

    async function loadTasks() {
      const data = await fetchJson("/api/tasks");
      const taskList = document.getElementById("task-list");
      taskList.innerHTML = "";
      document.getElementById("task-count").textContent = `${data.tasks.length} 个任务`;

      data.tasks.forEach((task) => {
        const button = document.createElement("button");
        button.className = "w-full rounded-lg border border-slate-800 bg-slate-950 p-3 text-left hover:border-slate-700 hover:bg-slate-900";
        button.innerHTML = `
          <div class="flex items-center justify-between gap-3">
            <div class="font-medium text-slate-100">${task.task_name || task.task_id}</div>
            <span class="rounded-full border px-2 py-0.5 text-xs ${task.status === "success" ? "border-emerald-500/40 text-emerald-300" : "border-rose-500/40 text-rose-300"}">${task.status}</span>
          </div>
          <div class="mt-2 text-xs text-slate-400">${task.task_id}</div>
          <div class="mt-1 text-xs text-slate-500">${task.branch || ""}</div>
        `;
        button.onclick = () => loadTaskDetail(task.task_id);
        taskList.appendChild(button);
      });

      if (!selectedTaskId && data.tasks.length > 0) {
        await loadTaskDetail(data.tasks[0].task_id);
      }
    }

    async function loadTaskDetail(taskId) {
      selectedTaskId = taskId;
      clearLiveLogs();
      const detail = await fetchJson(`/api/tasks/${taskId}`);
      const audit = detail.audit_log || {};
      document.getElementById("detail-title").textContent = audit.task_name || audit.task_id || taskId;
      document.getElementById("detail-meta").textContent = `任务ID: ${taskId} | 分支: ${audit.branch || "n/a"} | Commit: ${audit.commit || "n/a"}`;
      document.getElementById("detail-status").textContent = audit.status || (audit.success ? "success" : "unknown");
      document.getElementById("artifact-pr").innerHTML = marked.parse(detail.artifacts?.pr_description || "_暂无 PR 描述_");
      document.getElementById("artifact-review").innerHTML = marked.parse(detail.artifacts?.review_report || "_暂无审查报告_");
      document.getElementById("artifact-commit").textContent = detail.artifacts?.commit_message || "暂无 commit message";

      (detail.events || []).forEach((event) => appendLiveLog(event));
      connectTaskSocket(taskId);
    }

    async function refreshAll() {
      await Promise.all([loadMetrics(), loadTasks()]);
    }

    document.getElementById("refresh-button").addEventListener("click", refreshAll);
    refreshAll().catch((error) => {
      console.error(error);
      setSocketStatus("加载失败", false);
    });
  </script>
</body>
</html>
