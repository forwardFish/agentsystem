task_id: "S0-001"
task_name: "TradingAgentProfile Schema"
sprint: "Sprint 0"
epic: "Epic 0.1 平台契约"
story_id: "S0-001"
blast_radius: "L1"
execution_mode: "Safe"
mode: "Safe"
goal: "定义 TradingAgentProfile 的统一 JSON Schema，并提供合法示例与非法示例，作为后续 profile 生成、Agent 创建和 OpenClaw context 的统一契约。"
business_value: "把 TradingAgentProfile 契约一次钉死，避免后续 Agent 创建、上下文构建和 OpenClaw 绑定时反复返工。"
entry_criteria:
  - "需求文档已确认 TradingAgentProfile 的字段范围。"
  - "当前 Story 不依赖其他 Sprint 0 任务。"
acceptance_criteria:
  - "schema 包含 market、styleTags、preferredUniverse、riskControls、cadence、costModel、decisionPolicy、sourceRuntime 这些核心字段。"
  - "schema 明确必填字段，并限制额外字段写入。"
  - "提供一份合法示例 trading_agent_profile.example.json，并能通过 schema 校验。"
  - "提供一份非法示例 trading_agent_profile.invalid.json，并会被 schema 校验拒绝。"
  - "本 Story 只修改 docs/contracts 和 docs/contracts/examples 下的契约文件。"
constraints:
  - "只实现契约定义，不实现数据库表结构。"
  - "只实现 JSON Schema 和示例，不实现 API 或运行时逻辑。"
  - "所有产物必须使用 UTF-8 编码，并保持可读格式。"
out_of_scope:
  - "不实现 TradingAgentProfile 的数据库映射。"
  - "不实现 Agent 创建 API。"
  - "不实现 OpenClaw 绑定逻辑。"
not_do:
  - "不修改 apps/api 或 apps/web 业务代码。"
  - "不引入新的第三方依赖。"
dependencies:
  - "无"
related_files:
  - "docs/contracts/trading_agent_profile.schema.json"
  - "docs/contracts/examples/trading_agent_profile.example.json"
  - "docs/contracts/examples/trading_agent_profile.invalid.json"
primary_files:
  - "docs/contracts/trading_agent_profile.schema.json"
secondary_files:
  - "docs/contracts/examples/trading_agent_profile.example.json"
  - "docs/contracts/examples/trading_agent_profile.invalid.json"
story_inputs:
  - "TradingAgentProfile 需要承载的交易风格、风险约束与节奏信息。"
  - "后续 profile 生成、Agent 创建和 OpenClaw context 对统一契约的要求。"
  - "合法示例与非法示例需要覆盖的边界场景。"

story_process:
  - "定义 TradingAgentProfile 的统一 JSON Schema。"
  - "明确必填字段、枚举范围、嵌套结构和校验规则。"
  - "补齐合法示例与非法示例，作为后续实现和验收基线。"

story_outputs:
  - "TradingAgentProfile Schema 文件。"
  - "一组合法示例与非法示例。"

verification_basis:
  - "检查合法示例可以通过 Schema 校验。"
  - "检查非法示例会在预期字段上失败。"
  - "检查后续 profile、agent 创建链路能直接复用这份契约。"

test_cases:
  normal:
    - "合法示例能通过 schema 校验。"
    - "schema 文件是有效 JSON，且 required 字段与字段类型定义完整。"
  exception:
    - "非法示例缺少必填字段或结构错误时，会被 schema 校验拒绝。"
    - "如果 schema 文件损坏，测试 Agent 会报告 StoryValidation 失败。"
