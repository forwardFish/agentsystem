task_id: S0-003
task_name: Agent Contract Schema
sprint: Sprint 0
epic: Epic 0.1 Platform Contract
story_id: S0-003
blast_radius: L1
execution_mode: Safe
mode: Safe
goal: Define the register, heartbeat, and submit-actions payload schemas used by external runtimes to integrate with the platform.
business_value: Make the agent contract explicit, reusable, and safe to validate before any runtime integration or daily-loop execution.
entry_criteria:
  - S0-001 and S0-002 are completed so the platform profile and world-state contracts are already fixed.
acceptance_criteria:
  - docs/contracts/agent_register.schema.json defines agentId, runtime, runtimeAgentId, and capabilities as required fields.
  - docs/contracts/agent_heartbeat.schema.json defines capabilities, lastSeenAt, and a structured health object with status and latencyMs.
  - docs/contracts/agent_submit_actions.schema.json defines actions with required fields symbol, side, qty, reason, and idempotency_key.
  - Valid example payloads exist for register, heartbeat, and submit-actions, and each passes schema validation.
  - An invalid submit-actions example exists and is rejected by schema validation.
constraints:
  - Only modify the schema and example files required for this story.
  - Keep the output UTF-8 encoded and reusable by downstream OpenClaw and native runtime stories.
  - Do not implement API routes or runtime logic in this story.
out_of_scope:
  - Runtime authentication and binding logic.
  - API endpoint implementation for register, heartbeat, or submit-actions.
not_do:
  - Do not add platform business logic outside the payload contracts.
  - Do not introduce unrelated files or directories.
dependencies:
  - S0-001
  - S0-002
related_files:
  - docs/contracts/agent_register.schema.json
  - docs/contracts/agent_heartbeat.schema.json
  - docs/contracts/agent_submit_actions.schema.json
  - docs/contracts/examples/agent_register.example.json
  - docs/contracts/examples/agent_heartbeat.example.json
  - docs/contracts/examples/agent_submit_actions.example.json
  - docs/contracts/examples/agent_submit_actions.invalid.json
primary_files:
  - docs/contracts/agent_register.schema.json
  - docs/contracts/agent_heartbeat.schema.json
  - docs/contracts/agent_submit_actions.schema.json
secondary_files:
  - docs/contracts/examples/agent_register.example.json
  - docs/contracts/examples/agent_heartbeat.example.json
  - docs/contracts/examples/agent_submit_actions.example.json
  - docs/contracts/examples/agent_submit_actions.invalid.json
story_inputs:
  - "外部 runtime 接入平台时需要使用的 register、heartbeat、submit-actions 交互。"
  - "平台内部对 Agent 注册、心跳和动作提交的字段边界。"
  - "示例 payload 与非法示例需要覆盖的协议场景。"

story_process:
  - "定义 register、heartbeat、submit-actions 的请求与响应契约。"
  - "明确必填字段、状态字段和错误边界。"
  - "补齐有效示例和无效示例，固定集成协议。"

story_outputs:
  - "Agent 接入契约 schema。"
  - "register、heartbeat、submit-actions 的示例 payload。"

verification_basis:
  - "检查有效示例可以通过契约校验。"
  - "检查无效 submit-actions 请求会被正确拒绝。"
  - "检查外部 runtime 可以按该契约接入平台。"

test_cases:
  normal:
    - The register example validates against the register schema.
    - The heartbeat example validates against the heartbeat schema.
    - The submit-actions example validates against the submit-actions schema.
  exception:
    - The invalid submit-actions example is rejected because it omits idempotency_key and uses an invalid side/qty combination.
