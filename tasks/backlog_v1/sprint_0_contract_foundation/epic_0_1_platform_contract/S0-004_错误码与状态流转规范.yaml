task_id: S0-004
task_name: Error Codes and State Machine Spec
sprint: Sprint 0
epic: Epic 0.1 Platform Contract
story_id: S0-004
blast_radius: L1
execution_mode: Safe
mode: Safe
goal: Define the platform-wide error code catalog and the state-machine specification for statement, agent, order, and binding flows.
business_value: Give every downstream API and runtime story a stable contract for status transitions, failure reasons, and operator-facing diagnostics.
entry_criteria:
  - S0-001 to S0-003 are completed so the profile, world-state, and runtime payload contracts already exist.
acceptance_criteria:
  - docs/contracts/error_codes.md documents upload, parsing, risk, matching, and permission error categories.
  - docs/contracts/state_machine.md documents statement states uploaded, parsing, parsed, and failed.
  - docs/contracts/state_machine.md documents agent states active, paused, stale, and banned.
  - docs/contracts/state_machine.md documents order states submitted, rejected, and filled.
  - docs/contracts/state_machine.md documents binding states pending, active, revoked, and expired.
constraints:
  - Only modify the contract documentation files required for this story.
  - Keep the specification readable, UTF-8 encoded, and directly reusable by later API and runtime stories.
  - Do not implement API routes, database tables, or runtime code in this story.
out_of_scope:
  - API implementation for status transitions.
  - Persistence logic for order, binding, or statement state updates.
not_do:
  - Do not introduce unrelated files or directories.
  - Do not bundle runtime implementation details into the contract docs.
dependencies:
  - S0-003
related_files:
  - docs/contracts/error_codes.md
  - docs/contracts/state_machine.md
primary_files:
  - docs/contracts/error_codes.md
  - docs/contracts/state_machine.md
secondary_files: []
story_inputs:
  - "statement、agent、order、binding 等核心流程的状态流转需求。"
  - "平台级错误码目录需要覆盖的业务与系统异常。"
  - "S0-001 到 S0-003 已固定的契约边界。"

story_process:
  - "整理平台范围内的错误码目录。"
  - "定义 statement、agent、order、binding 的状态机流转规则。"
  - "明确允许跳转、禁止跳转和对应错误码。"

story_outputs:
  - "统一错误码规范。"
  - "statement、agent、order、binding 的状态机规范。"

verification_basis:
  - "检查每个核心流程都有清晰的状态迁移规则。"
  - "检查非法跳转能映射到明确错误码。"
  - "检查后续实现能按规范统一返回状态与错误。"

test_cases:
  normal:
    - error_codes.md includes upload, parsing, risk, matching, and permission sections.
    - state_machine.md includes the required statement, agent, order, and binding states.
  exception:
    - Missing categories or missing states cause story-specific validation to fail.
