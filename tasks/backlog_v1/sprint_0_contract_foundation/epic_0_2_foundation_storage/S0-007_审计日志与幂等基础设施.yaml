task_id: "S0-007"
task_name: "审计日志与幂等基础设施"
sprint: "Sprint 0"
epic: "Epic 0.2 基础存储与底座"
story_id: "S0-007"
blast_radius: "L1"
execution_mode: "Safe"
mode: "Safe"

goal: "提供统一的 audit write helper 和 idempotency check helper，作为后续订单、成交和运行日志链路的基础设施。"
business_value: "让审计日志与幂等能力成为可独立验收、可复用的底层模块，支撑后续 Story 的一致性和可追踪性。"

entry_criteria:
  - "S0-005 已完成，核心表结构已定义。"
  - "S0-006 已完成，基础存储与 statement 元数据模式已建立。"

acceptance_criteria:
  - "audit/service.py 和 idempotency/service.py 提供可独立复用的核心 helper。"
  - "本 Story 只覆盖 audit 和 idempotency 两个模块，不扩展到相邻业务模块。"
  - "产出的 helper 可被后续 Story 直接复用。"
  - "正常路径和关键失败路径都具备可验证的结果。"

constraints:
  - "Story 规模控制在 0.5 天到 1 天。"
  - "只修改当前 Story 相关文件，不跨多个大模块。"
  - "优先修改这些 primary files: apps/api/src/modules/audit/service.py, apps/api/src/modules/idempotency/service.py"

out_of_scope:
  - "不在本 Story 中实现下游订单、成交或调度功能。"
  - "不做架构级重构。"

not_do:
  - "不实现实际数据库执行器。"
  - "不新增额外的 API 路由。"

dependencies:
  - "S0-006"

related_files:
  - "apps/api/src/modules/audit/service.py"
  - "apps/api/src/modules/idempotency/service.py"
  - "scripts/init_schema.sql"

primary_files:
  - "apps/api/src/modules/audit/service.py"
  - "apps/api/src/modules/idempotency/service.py"

secondary_files:
  - "scripts/init_schema.sql"

story_inputs:
  - "订单、成交、运行日志链路需要的审计记录能力。"
  - "提交动作和重复请求需要的幂等保护。"
  - "核心 DB schema 中审计和幂等相关的基础表结构。"

story_process:
  - "实现统一的 audit write helper。"
  - "实现统一的 idempotency check helper。"
  - "让后续订单、成交和运行链路都能复用这套基础设施。"

story_outputs:
  - "审计日志写入基础设施。"
  - "幂等检查与去重基础设施。"

verification_basis:
  - "检查关键链路可以写出审计日志。"
  - "检查相同 idempotency key 不会重复处理。"
  - "检查后续业务模块能够直接复用这两类 helper。"

test_cases:
  normal:
    - "audit helper 能生成标准化写入 payload 和 SQL 查询。"
    - "idempotency helper 能生成 lookup/insert 查询，并对首次请求返回 seen_before=false。"
  exception:
    - "idempotency helper 对重复请求返回 seen_before=true，并保留 result_ref/status。"
    - "helper 缺失关键字段时，Story 专项校验会失败。"
