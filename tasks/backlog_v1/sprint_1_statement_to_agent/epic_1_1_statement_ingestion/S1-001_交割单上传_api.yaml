task_id: "S1-001"
task_name: "交割单上传 API"
sprint: "Sprint 1"
epic: "Epic 1.1 交割单摄入"
story_id: "S1-001"
blast_radius: "L2"
execution_mode: "Safe"
mode: "Safe"

goal: "实现交割单上传入口，校验 CSV/XLS/XLSX 文件基础约束，生成 statement_id、upload_status、object_key，为后续解析链路提供稳定输入。"
business_value: "让交割单上传 API 成为可独立验收、可直接进入 Agent 执行闭环的业务 Story。"

entry_criteria:
  - "S0-006 已完成，Statement 元数据与对象存储命名规范已定义。"

acceptance_criteria:
  - "上传 API 的核心输出可独立验收，返回 statement_id、upload_status、object_key。"
  - "本 Story 只覆盖交割单上传与对象存储落盘准备，不扩展到解析或 DNA 生成链路。"
  - "支持 csv/xls/xlsx，限制单文件最大 10MB，非法格式或超限返回可解释错误。"
  - "生成的 object_key 与 bucket 信息可被后续 Story 直接复用。"
  - "正常路径和关键失败路径都具备可验证的结果。"

constraints:
  - "每个 Story 控制在 0.5 天到 1 天内完成。"
  - "只修改当前 Story 相关文件，不跨多个大模块。"
  - "优先修改这些 primary files: apps/api/src/api/command/routes.py, apps/api/src/modules/statements/service.py, apps/api/src/schemas/command.py"

out_of_scope:
  - "不在本 Story 中实现交割单解析、标准化或 Agent DNA 生成。"
  - "不实现真实对象存储客户端，只完成上传契约和 object_key 生成逻辑。"

not_do:
  - "不新增额外 API 路由。"
  - "不改动无关的 world、ledger、openclaw 模块。"

dependencies:
  - "S0-006"

related_files:
  - "apps/api/src/api/command/routes.py"
  - "apps/api/src/schemas/command.py"
  - "apps/api/src/modules/statements/service.py"
  - "apps/api/src/infra/storage/object_store.py"

primary_files:
  - "apps/api/src/api/command/routes.py"
  - "apps/api/src/schemas/command.py"
  - "apps/api/src/modules/statements/service.py"

secondary_files:
  - "apps/api/src/infra/storage/object_store.py"

story_inputs:
  - "用户上传的 CSV/XLS/XLSX 交割单文件。"
  - "文件大小、扩展名、MIME 类型等基础校验规则。"
  - "S0-006 提供的对象存储和 statement 元数据契约。"

story_process:
  - "校验上传文件的基础约束。"
  - "生成 statement_id、upload_status 和 object_key。"
  - "把交割单原件和元数据写入稳定存储。"

story_outputs:
  - "交割单上传 API。"
  - "一条带 statement_id、upload_status、object_key 的 statement 记录。"

verification_basis:
  - "检查合法文件可以上传成功并返回 statement_id。"
  - "检查返回结果包含 upload_status 和 object_key。"
  - "检查对象存储与元数据写入一致。"

test_cases:
  normal:
    - "正常路径：合法 csv 文件输入时，返回 uploaded 状态、statement_id、object_key 和 bucket。"
  exception:
    - "异常路径：非法扩展名时返回 rejected 和可解释错误。"
    - "异常路径：超过 10MB 时返回 rejected 和可解释错误。"
    - "异常路径：空文件时返回 rejected 和可解释错误。"
