task_id: "S1-004"
task_name: "上传失败处理"
sprint: "Sprint 1"
epic: "Epic 1.1 交割单摄入"
story_id: "S1-004"
blast_radius: "L1"
execution_mode: "Fast"
mode: "Fast"

goal: "覆盖上传阶段关键失败路径，确保对象存储和 metadata 不留下脏数据。"
business_value: "让交割单上传链路在失败时可回滚、可解释、可追踪。"

entry_criteria:
  - "S1-001、S1-002、S1-003 已完成。"

acceptance_criteria:
  - "空文件、超 10MB、非法扩展名都会被拒绝并返回统一错误信息。"
  - "对象存储写入失败时返回 500，且不会创建 metadata。"
  - "metadata 持久化失败时会回滚已上传对象。"
  - "失败结果可通过查询接口看到 error_message。"

constraints:
  - "只修改上传服务、存储和 metadata 持久化相关代码。"
  - "失败处理必须保持幂等。"
  - "不得影响成功上传路径的返回结构。"

out_of_scope:
  - "不在本 Story 中实现解析失败路径。"
  - "不引入异步补偿队列。"

not_do:
  - "不调整对象存储命名规范。"
  - "不扩展更多上传校验规则。"

dependencies:
  - "S1-003"

related_files:
  - "apps/api/src/modules/statements/service.py"
  - "apps/api/src/modules/statements/repository.py"
  - "apps/api/src/infra/storage/object_store.py"
  - "apps/api/src/api/command/routes.py"

primary_files:
  - "apps/api/src/modules/statements/service.py"
  - "apps/api/src/modules/statements/repository.py"

secondary_files:
  - "apps/api/src/infra/storage/object_store.py"
  - "apps/api/src/api/command/routes.py"

test_cases:
  normal:
    - "正常路径：合法文件上传后 metadata 和对象文件都成功写入。"
  exception:
    - "异常路径：对象存储失败时返回 500 且 metadata 不存在。"
    - "异常路径：metadata 持久化失败时对象文件被回滚删除。"
    - "异常路径：空文件和超大文件返回 400。"
