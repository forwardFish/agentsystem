task_id: "S1-005"
task_name: "券商字段映射规则"
sprint: "Sprint 1"
epic: "Epic 1.2 交割单解析与标准化"
story_id: "S1-005"
blast_radius: "L1"
execution_mode: "Fast"
mode: "Fast"

goal: "定义并识别券商交割单列头映射规则，把原始列名映射到平台统一字段。"
business_value: "让不同来源的交割单能进入同一套解析链路，为标准化和 Agent 建模提供统一输入。"

entry_criteria:
  - "S1-003 已完成，文件类型和 parser_key 已能识别。"

acceptance_criteria:
  - "至少支持一套中文列头和一套英文列头的映射规则。"
  - "能识别 traded_at、symbol、side、qty、price、fee、tax 等关键字段。"
  - "缺失关键列时返回统一错误码。"
  - "映射规则可被解析服务直接复用。"

constraints:
  - "只修改 mapping rules 和解析入口相关文件。"
  - "规则必须可单测，不依赖外部服务。"
  - "不得把字段映射逻辑散落到多个无关模块。"

out_of_scope:
  - "不在本 Story 中实现 TradeRecord 标准化。"
  - "不实现券商格式自动学习。"

not_do:
  - "不改动上传链路。"
  - "不改动 Agent Profile 模块。"

dependencies:
  - "S1-003"

related_files:
  - "apps/api/src/modules/statements/mappers/rules.py"
  - "apps/api/src/modules/statements/mappers/__init__.py"
  - "apps/api/src/modules/statements/parser_service.py"

primary_files:
  - "apps/api/src/modules/statements/mappers/rules.py"

secondary_files:
  - "apps/api/src/modules/statements/mappers/__init__.py"
  - "apps/api/src/modules/statements/parser_service.py"

test_cases:
  normal:
    - "正常路径：中文列头样例能识别并映射到统一字段。"
    - "正常路径：英文列头样例能识别并映射到统一字段。"
  exception:
    - "异常路径：缺失关键列时返回 STATEMENT_MAPPING_RULE_NOT_FOUND。"
