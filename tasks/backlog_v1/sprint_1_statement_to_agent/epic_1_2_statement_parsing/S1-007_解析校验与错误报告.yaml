task_id: "S1-007"
task_name: "解析校验与错误报告"
sprint: "Sprint 1"
epic: "Epic 1.2 交割单解析与标准化"
story_id: "S1-007"
blast_radius: "L1"
execution_mode: "Fast"
mode: "Fast"

goal: "生成结构化 parse report，并在解析成功或失败时更新 statement 最终状态。"
business_value: "让解析链路具备可审计、可追踪、可复盘的结果输出，而不是只有黑盒成功或失败。"

entry_criteria:
  - "S1-006 已完成，TradeRecord 标准化可用。"

acceptance_criteria:
  - "解析成功时会生成包含 parsed_records、failed_records 和 issues 的 parse report。"
  - "解析成功后 statement 状态会更新为 parsed。"
  - "解析失败时 statement 状态会更新为 failed，并记录统一错误码。"
  - "查询接口能读取 parse report 和最终状态。"

constraints:
  - "只修改解析服务、状态更新和查询接口相关文件。"
  - "错误报告结构必须稳定，便于后续 Dashboard 展示。"
  - "不得吞掉异常原因。"

out_of_scope:
  - "不在本 Story 中实现 Profile 提取。"
  - "不在本 Story 中实现失败自动重试。"

not_do:
  - "不修改上传 API 的返回结构。"
  - "不新增额外后台任务。"

dependencies:
  - "S1-006"

related_files:
  - "apps/api/src/modules/statements/parser_service.py"
  - "apps/api/src/api/command/routes.py"
  - "apps/api/src/api/query/routes.py"
  - "apps/api/src/modules/statements/service.py"

primary_files:
  - "apps/api/src/modules/statements/parser_service.py"
  - "apps/api/src/api/query/routes.py"

secondary_files:
  - "apps/api/src/api/command/routes.py"
  - "apps/api/src/modules/statements/service.py"

story_inputs:
  - "标准化后的 TradeRecord 列表。"
  - "解析成功、解析失败和局部异常需要产出的报告结构。"
  - "statement 最终状态更新规则。"

story_process:
  - "对标准化 TradeRecord 执行解析校验。"
  - "生成结构化 parse report。"
  - "根据解析结果更新 statement 最终状态为 parsed 或 failed。"

story_outputs:
  - "结构化 parse report。"
  - "更新后的 statement 最终状态。"

verification_basis:
  - "检查解析成功时会生成完整 parse report 并更新为 parsed。"
  - "检查解析失败时会记录错误并更新为 failed。"
  - "检查 report 能作为 profile 提取和人工验收依据。"

test_cases:
  normal:
    - "正常路径：解析成功后生成 parse report，statement 状态变为 parsed。"
  exception:
    - "异常路径：无有效映射规则时生成失败报告，statement 状态变为 failed。"
    - "异常路径：查询不存在的 parse report 时返回可解释错误。"
