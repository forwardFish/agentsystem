task_id: "S1-009"
task_name: "风格标签与风控约束生成"
sprint: "Sprint 1"
epic: "Epic 1.3 Agent DNA / Profile"
story_id: "S1-009"
blast_radius: "L1"
execution_mode: "Fast"
mode: "Fast"

goal: "基于基础 Profile 生成 styleTags、riskControls 和 cadence。"
business_value: "让交易画像升级为可驱动 Agent 运行的结构化配置，而不是停留在描述层。"

entry_criteria:
  - "S1-008 已完成，基础 Profile 提取可用。"

acceptance_criteria:
  - "输出包含 styleTags、riskControls、cadence 等核心字段。"
  - "riskControls 至少覆盖 maxPositionPct、maxHoldDays、tradesPerDay 等约束。"
  - "同一输入生成结果稳定且可解释。"
  - "输出结构可直接用于 Agent 创建。"

constraints:
  - "只修改 DNA/Profile 生成相关模块和 schema。"
  - "不引入外部画像服务。"
  - "输出字段命名与现有 agent schema 保持一致。"

out_of_scope:
  - "不在本 Story 中创建 Agent。"
  - "不实现动态自学习更新。"

not_do:
  - "不改动上传或解析模块。"
  - "不引入额外数据库持久化层。"

dependencies:
  - "S1-008"

related_files:
  - "apps/api/src/domain/dna_engine/service.py"
  - "apps/api/src/schemas/agent.py"

primary_files:
  - "apps/api/src/domain/dna_engine/service.py"
  - "apps/api/src/schemas/agent.py"

secondary_files:
  - "apps/api/src/schemas/trade.py"

story_inputs:
  - "S1-008 产出的基础 TradingAgentProfile。"
  - "styleTags、riskControls 和 cadence 的生成规则。"
  - "Agent 创建前需要固定的风险边界。"

story_process:
  - "基于基础 profile 生成 styleTags。"
  - "生成 riskControls 和 cadence。"
  - "把基础画像补齐为可创建 Agent 的完整 profile。"

story_outputs:
  - "带 styleTags、riskControls 和 cadence 的完整 profile。"
  - "可直接进入 Agent 创建 API 的 profile 结果。"

verification_basis:
  - "检查输出包含 styleTags、riskControls 和 cadence。"
  - "检查风控约束与基础画像保持一致。"
  - "检查 Agent 创建链路可直接使用这份结果。"

test_cases:
  normal:
    - "正常路径：基础 Profile 输入后生成 styleTags 和 riskControls。"
  exception:
    - "异常路径：输入信息不足时返回可解释结果，不生成不完整配置。"
