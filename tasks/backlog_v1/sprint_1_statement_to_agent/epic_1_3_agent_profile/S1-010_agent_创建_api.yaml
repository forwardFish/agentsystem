task_id: "S1-010"
task_name: "Agent 创建 API"
sprint: "Sprint 1"
epic: "Epic 1.3 Agent DNA / Profile"
story_id: "S1-010"
blast_radius: "L2"
execution_mode: "Safe"
mode: "Safe"

goal: "基于 statement、Profile 和初始资金创建 Agent，并返回可查询的 agent_id。"
business_value: "让交割单到 Agent 建模的业务链路真正闭环，形成平台里的可运行实体。"

entry_criteria:
  - "S1-009 已完成，Profile 和风控约束生成可用。"

acceptance_criteria:
  - "创建接口能接收 statement_id、profile 和 init_cash，并返回 agent_id。"
  - "会持久化 Agent 基础信息和 Profile 摘要。"
  - "失败时返回统一错误结构，不产生半成品数据。"
  - "查询接口能读取新创建的 Agent 基础信息。"

constraints:
  - "只修改 Agent 创建相关 API、service 和 schema。"
  - "优先复用现有 command/query 路由结构。"
  - "不得把 Agent 创建逻辑耦合进上传或解析服务。"

out_of_scope:
  - "不在本 Story 中实现 Agent 日循环。"
  - "不实现前端页面或公开分享页。"

not_do:
  - "不改动世界、账本、OpenClaw 模块。"
  - "不新增复杂审批流程。"

dependencies:
  - "S1-009"

related_files:
  - "apps/api/src/api/command/routes.py"
  - "apps/api/src/api/query/routes.py"
  - "apps/api/src/domain/agent_registry/service.py"
  - "apps/api/src/schemas/agent.py"

primary_files:
  - "apps/api/src/api/command/routes.py"
  - "apps/api/src/domain/agent_registry/service.py"

secondary_files:
  - "apps/api/src/api/query/routes.py"
  - "apps/api/src/schemas/agent.py"

story_inputs:
  - "statement 元数据、完整 TradingAgentProfile 和初始资金。"
  - "Agent 创建需要写入的 agents、profiles、关联状态等对象。"
  - "query API 后续需要查询的 agent_id 和基础信息。"

story_process:
  - "基于 statement、profile 和初始资金创建 Agent。"
  - "写入 Agent 记录并建立必要关联。"
  - "返回可供查询链路使用的 agent_id。"

story_outputs:
  - "Agent 创建 API。"
  - "一条可查询的 agent 记录和 agent_id。"

verification_basis:
  - "检查创建成功后能返回 agent_id。"
  - "检查 query API 可以查询到新建 Agent。"
  - "检查创建结果关联到 statement 和 profile。"

test_cases:
  normal:
    - "正常路径：基于有效 statement 和 Profile 创建 Agent，返回 agent_id。"
    - "正常路径：创建完成后可通过查询接口读取 Agent 基础信息。"
  exception:
    - "异常路径：缺失 statement 或 Profile 时返回统一错误。"
    - "异常路径：持久化失败时不保留半成品 Agent 数据。"
