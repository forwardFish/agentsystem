test_cases:
  normal:
  - 正常路径：dashboard 能显示最新 Finahunt Sprint 2 运行结果与阶段过程。
  - 正常路径：用户能从 sprint 列表页和 S2 story 详情页进入展示页。
  exception:
  - 异常路径：当不存在 runtime 产物时，展示页返回空态而不是报错。
